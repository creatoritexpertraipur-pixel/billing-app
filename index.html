<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Offline Billing PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #333; --light: #f4f4f9; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--light); color: var(--dark); }
        
        /* Navigation Tabs Bar */
        .navbar { display: flex; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px 5px; font-weight: bold; font-size: 14px; cursor: pointer; color: #666; border-bottom: 3px solid transparent; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #f0f7ff; }
        
        .container { max-width: 600px; margin: 15px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .page { display: none; }
        .page.active { display: block; }
        
        h1 { text-align: center; font-size: 22px; color: var(--primary); margin-top: 0; margin-bottom: 20px; }
        h2 { font-size: 18px; border-left: 4px solid var(--primary); padding-left: 8px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        
        .btn { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); padding: 5px 10px; font-size: 12px; width: auto; }
        .flex-group { display: flex; gap: 10px; }
        
        ul { list-style: none; padding: 0; margin: 10px 0; }
        li { background: #f8f9fa; padding: 10px; margin-bottom: 5px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .total-box { text-align: right; margin-top: 15px; padding: 10px; background: #e9ecef; border-radius: 6px; }
        
        #qrcode-container { margin-top: 15px; display: flex; flex-direction: column; align-items: center; background: #fff; padding: 10px; border-radius: 8px; }
        #qrcode img { padding: 10px; background: white; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-item active" onclick="switchPage('billing-page', this)">🧾 Billing</div>
    <div class="nav-item" onclick="switchPage('menu-page', this)">🍔 Manage Menu</div>
    <div class="nav-item" onclick="switchPage('settings-page', this)">⚙️ Settings</div>
</div>

<div class="container">
    
    <div id="billing-page" class="page active">
        <h1 id="displayShopName">🏨 Hotel Billing App</h1>
        <h2>🧾 Customer Ka Bill Banayein</h2>
        <div class="form-group flex-group">
            <select id="billItemSelect"></select>
            <input type="number" id="billItemQty" value="1" min="1" style="width: 70px;">
            <button class="btn" onclick="addItemToCurrentBill()" style="margin:0; width:auto;">+ Jodein</button>
        </div>

        <table id="currentBillTable">
            <thead>
                <tr><th>Item</th><th>Rate</th><th>Qty</th><th>Total</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <div class="total-box">
            <h3 style="margin:0;">Grand Total: ₹<span id="finalTotal">0</span></h3>
        </div>
        
        <button class="btn btn-success" onclick="printBill()" style="margin-top: 15px; font-size: 18px;">🖨️ Print & Show UPI QR</button>
    </div>

    <div id="menu-page" class="page">
        <h1>📋 Menu Management</h1>
        <h2>🍔 Naye Items Jodein</h2>
        <div class="form-group flex-group">
            <input type="text" id="itemName" placeholder="Item Name (Samosa, Chai)">
            <input type="number" id="itemPrice" placeholder="Price" style="width: 100px;">
            <button class="btn" onclick="addMenuItem()" style="margin:0; width:auto;">Add</button>
        </div>
        
        <h2>Current Menu Items</h2>
        <ul id="menuList"></ul>
    </div>

    <div id="settings-page" class="page">
        <h1>⚙️ Shop Profile Settings</h1>
        <h2>🏪 Shop Details</h2>
        <div class="form-group">
            <label>Hotel / Shop Ka Naam:</label>
            <input type="text" id="hotelName" placeholder="e.g., Sharma Ji Misthan Bhandar">
        </div>
        <div class="form-group">
            <label>Hotel Ka Pata (Address):</label>
            <textarea id="hotelAddress" rows="2" placeholder="e.g., Main Road, Ranchi"></textarea>
        </div>
        <div class="form-group">
            <label>UPI ID (For QR Payment):</label>
            <input type="text" id="hotelUPI" placeholder="e.g., sharma@apl">
        </div>
        <button class="btn" onclick="saveHotelSettings()">⚙️ Settings Save Karen</button>
    </div>

</div>

<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(() => console.log("Service Worker Active!"))
        .catch(err => console.log("Service Worker Error", err));
    }
</script>
</body>
</html>
